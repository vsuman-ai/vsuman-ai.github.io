    <text x="195" y="288" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" fill="#F9FAFB">VS</text>
  </g>

  <text x="340" y="245" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="700" letter-spacing="-1.5" fill="#F9FAFB">Vicky Suman</text>
  <text x="340" y="315" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="400" fill="#CBD5E1">Senior Data Science Engineer</text>

  <rect x="340" y="372" width="318" height="54" rx="27" fill="#FFFFFF0F" stroke="#FFFFFF1A" stroke-width="1"/>
